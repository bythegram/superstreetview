name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Inject Maps browser API key (public, referrer-restricted)
        env:
          GOOGLE_MAPS_BROWSER_API_KEY: ${{ secrets.GOOGLE_MAPS_BROWSER_API_KEY }}
        run: |
          python3 - <<'EOF'
          import os
          # This is a Google Maps browser API key; it will be embedded in the
          # deployed index.html/game.js and must be protected via strict HTTP
          # referrer restrictions in Google Cloud Console, not by secrecy.
          key = os.environ['GOOGLE_MAPS_BROWSER_API_KEY']
          for filename in ['index.html', 'game.js']:
              with open(filename, 'r') as f:
                  content = f.read()
              content = content.replace('GOOGLE_MAPS_API_KEY_PLACEHOLDER', key)
              with open(filename, 'w') as f:
                  f.write(content)
          EOF

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
